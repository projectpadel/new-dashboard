[build]
  command = "npm run build"
  publish = "dist/client"

# Set in Netlify → Site configuration → Environment variables (Build & runtime):
#   VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY, SUPABASE_SERVICE_ROLE_KEY
# Optional: OPENAI_API_KEY, OPENAI_MODEL

# TanStack Start SSR + server functions (written during `npm run build`)
[functions]
  directory = ".netlify/v1/functions"
  node_bundler = "esbuild"
